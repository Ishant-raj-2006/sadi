<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooja & Uttam Wedding | Experience</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="welcome-container">
        <div class="bg-zoom" id="slideshow-bg"></div>
        <div class="welcome-content">
            <p class="script-font">Wedding Bells</p>
            <p>The Union Of</p>
            <h1>Pooja & Uttam</h1>
            <p class="script-font" style="font-size: 2.5rem; margin-top: 0.5rem; color: var(--secondary);">April 21,
                2024</p>
            <div style="margin: 2.5rem 0;">
                <button class="enter-btn" onclick="enterExperience()">Begin Journey</button>
            </div>
            <p style="font-size: 0.75rem; opacity: 0.6; letter-spacing: 3px; margin-top: 3rem;">POOJA &bull; UTTAM</p>
        </div>
    </div>

    <audio id="init-audio" src="./music/Aankhon.mp3" preload="auto"></audio>

    <script src="script.js"></script>
    <script>
        const weddingPhotos = [];
        const totalPhotos = 119;

        for (let i = 1; i <= totalPhotos; i++) {
            if (i === 57) continue;
            weddingPhotos.push(`img/wedding/${i}.jpg`);
        }

        let currentIdx = 0;
        const bgElement = document.getElementById('slideshow-bg');

        function changeBackground() {
            const nextImg = new Image();
            nextImg.src = weddingPhotos[currentIdx];
            nextImg.onload = () => {
                bgElement.style.backgroundImage = `url('${weddingPhotos[currentIdx]}')`;
                currentIdx = (currentIdx + 1) % weddingPhotos.length;
            };
        }

        changeBackground();
        setInterval(changeBackground, 5000); // 5 seconds for elegance

        function enterExperience() {
            const audio = document.getElementById('init-audio');
            const playPromise = audio.play();

            sessionStorage.setItem('wedding_music_playing', 'true');
            document.querySelector('.welcome-content').style.opacity = '0';
            document.querySelector('.welcome-content').style.transform = 'scale(1.1)';
            document.querySelector('.welcome-content').style.transition = 'all 1s ease';

            setTimeout(() => {
                window.location.href = 'home.html';
            }, 800);
        }
    </script>
</body>

</html>
