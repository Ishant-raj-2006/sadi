<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilak Moments | Pooja & Uttam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-header">
        <div style="position: absolute; inset: 0; background: url('img/tilak/1.jpg') center/cover; filter: brightness(0.5);"></div>
        <div style="z-index: 1; text-align: center;">
            <p class="script-font">Sacred Promise</p>
            <h1 style="color: white; margin: 1rem 0;">Tilak Ceremony</h1>
            <a href="home.html" style="color: white; text-decoration: none; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.3); padding: 0.8rem 2rem; border-radius: 50px; display: inline-block; margin-top: 1.5rem; transition: 0.3s;" onmouseover="this.style.background='white'; this.style.color='black'" onmouseout="this.style.background='transparent'; this.style.color='white'">← Back to Menu</a>
        </div>
    </div>

    <main class="gallery-grid" id="gallery-container"></main>

    <footer style="text-align: center; padding: 4rem 1rem; opacity: 0.5; font-size: 0.8rem; letter-spacing: 2px;">
        POOJA & UTTAM &bull; TILAK
    </footer>

    <div id="lightbox" onclick="if(event.target == this) closeLightbox()">
        <div id="lightbox-content">
            <span class="close-btn" onclick="closeLightbox()">&times;</span>
            <img id="lightbox-img">
            <div style="position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 20px; pointer-events: none;">
                <button onclick="prevImage()" style="pointer-events: auto; background: var(--glass); border: none; color: white; font-size: 2rem; padding: 1rem; border-radius: 50%; cursor: pointer;">❮</button>
                <button onclick="nextImage()" style="pointer-events: auto; background: var(--glass); border: none; color: white; font-size: 2rem; padding: 1rem; border-radius: 50%; cursor: pointer;">❯</button>
            </div>
        </div>
    </div>

    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
    </div>

    <audio id="player" loop preload="auto"></audio>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initGallery('tilak');
            setupMusic('./music/Aankhon.mp3');
        });
    </script>
</body>
</html>
